title: Registry Run Key Persistence
id: 3f442c66-b039-4e2f-9dda-1510ba87af0c
status: experimental
description: Detects modification of registry run keys used for persistence with values pointing to suspicious paths.
references:
  - https://attack.mitre.org/techniques/T1547/001/
  - DH-009
author: Michael Stewart
date: 2026-03-26
logsource:
  category: registry_set
  product: windows
detection:
  selection:
    TargetObject|contains:
      - '\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\Run\'
      - '\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\RunOnce\'
  filter_legitimate:
    Details|contains:
      - 'C:\\Program Files\\'
      - 'C:\\Windows\\System32\\'
  condition: selection and not filter_legitimate
falsepositives:
  - Legitimate software adding run keys outside Program Files
level: medium
tags:
  - attack.persistence
  - attack.t1547.001
  - DH-009
