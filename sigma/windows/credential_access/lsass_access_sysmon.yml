title: Suspicious LSASS Process Access via Sysmon
id: 46fea6c6-181c-4e44-ab6c-1e4ea933534a
status: experimental
description: Detects suspicious process access to lsass.exe with PROCESS_VM_READ rights. Covers nanodump and reflective .NET tooling not caught by process creation rules.
references:
  - https://attack.mitre.org/techniques/T1003/001/
  - DH-001
author: Michael Stewart
date: 2026-03-26
logsource:
  category: process_access
  product: windows
detection:
  selection:
    TargetImage|endswith: '\\lsass.exe'
    GrantedAccess|contains:
      - '0x1010'
      - '0x1410'
      - '0x147a'
      - '0x143a'
  filter_legitimate:
    SourceImage|endswith:
      - '\\MsMpEng.exe'
      - '\\csrss.exe'
      - '\\wininit.exe'
      - '\\services.exe'
  condition: selection and not filter_legitimate
falsepositives:
  - Security products monitoring LSASS
  - AV/EDR process access
level: high
tags:
  - attack.credential_access
  - attack.t1003.001
  - DH-001
