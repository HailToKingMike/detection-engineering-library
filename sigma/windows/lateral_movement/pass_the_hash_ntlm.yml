title: Pass-the-Hash NTLM Lateral Movement
id: 1134dfb8-f4df-4e58-8eca-685772f20f27
status: experimental
description: Detects pass-the-hash lateral movement via Type 3 NTLM network logons from unexpected sources.
references:
  - https://attack.mitre.org/techniques/T1550/002/
  - DH-004
author: Imperium Defense
date: 2026-03-26
logsource:
  product: windows
  service: security
detection:
  selection:
    EventID: 4624
    LogonType: 3
    AuthenticationPackageName: 'NTLM'
    LogonProcessName: 'NtLmSsp'
  filter_anonymous:
    SubjectUserName: 'ANONYMOUS LOGON'
  filter_local:
    IpAddress|startswith:
      - '127.'
      - '::1'
  condition: selection and not 1 of filter_*
falsepositives:
  - Legitimate NTLM network authentication in mixed environments
level: low
tags:
  - attack.lateral_movement
  - attack.t1550.002
  - DH-004
