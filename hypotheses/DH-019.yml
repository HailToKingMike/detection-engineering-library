hypothesis_id: DH-019
status: Backlog
created: '2026-03-26'
priority: 19
adversary_profile: APT29, C2 operators
adversary_behavior: DNS exfiltration bypass through Cloudflare Gateway using encoded
  data in subdomain queries to bypass inspection.
attack_technique: T1071.004
attack_tactic: Exfiltration
hypothesis: If an attacker exfiltrates via DNS, then Cloudflare Gateway logs will
  show high-entropy subdomain queries or unusually large TXT record responses to a
  single domain not on the allow list.
required_telemetry:
- source: Cloudflare Gateway DNS logs (S3+SQS integration — operational)
  available: true
- source: Sysmon Event ID 22 (DNS Query)
  available: true
expected_signals:
- High subdomain entropy (>3.5 Shannon entropy) queries
- TXT or NULL record queries to non-CDN domains
- Single domain receiving hundreds of queries with unique subdomains
- Query payload size anomalies
test_method: dnscat2 over Cloudflare-inspected DNS path
test_variants:
- dnscat2 TXT channel
- iodine tunnel
- custom base64 subdomain encoder
linked_sigma_rule: sigma/network/dns_exfiltration_high_entropy.yml
coverage_result:
  elastic: 0
  crowdstrike: 0
notes: Cloudflare integration is operational (148.6M docs, 77% of total volume). This
  is a high-value rule given Cloudflare is the primary DNS inspection point. Score
  should move quickly once lab DNS logging is configured.
